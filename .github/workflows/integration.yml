name: Integration Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-coverlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - run: go build -o coverlint ./cmd/coverlint
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverlint-binary
          path: coverlint
          retention-days: 1

  test-gocover:
    needs: build-coverlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverlint-binary
      - run: chmod +x coverlint

      - name: Generate coverage
        working-directory: testdata/projects/go
        run: go test -coverprofile=cover.out ./...

      - name: Run coverlint
        env:
          INPUT_PATH: cover.out
          INPUT_FORMAT: gocover
          INPUT_MIN-LINE: "100"
          INPUT_WORKING-DIRECTORY: testdata/projects/go
          INPUT_FAIL-ON-ERROR: "true"
        run: ./coverlint

  test-auto-detect:
    needs: build-coverlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverlint-binary
      - run: chmod +x coverlint

      - name: Generate coverage
        working-directory: testdata/projects/go
        run: go test -coverprofile=cover.out ./...

      - name: Run coverlint without explicit format
        env:
          INPUT_PATH: cover.out
          INPUT_MIN-LINE: "100"
          INPUT_WORKING-DIRECTORY: testdata/projects/go
          INPUT_FAIL-ON-ERROR: "true"
        run: ./coverlint

  test-failure-detection:
    needs: build-coverlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverlint-binary
      - run: chmod +x coverlint

      - name: Create low-coverage LCOV report
        run: |
          mkdir -p /tmp/failtest
          printf 'SF:example.js\nDA:1,1\nDA:2,0\nDA:3,0\nDA:4,0\nDA:5,0\nLF:5\nLH:1\nend_of_record\n' > /tmp/failtest/lcov.info

      - name: Verify coverlint detects threshold failure
        env:
          INPUT_PATH: lcov.info
          INPUT_FORMAT: lcov
          INPUT_MIN-LINE: "90"
          INPUT_WORKING-DIRECTORY: /tmp/failtest
          INPUT_FAIL-ON-ERROR: "true"
        run: |
          if ./coverlint; then
            echo "ERROR: coverlint should have failed but exited 0"
            exit 1
          fi
          echo "coverlint correctly detected threshold failure"

  test-lcov-node:
    needs: build-coverlint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverlint-binary
      - run: chmod +x coverlint

      - name: Install dependencies
        working-directory: testdata/projects/node
        run: npm install

      - name: Generate coverage
        working-directory: testdata/projects/node
        run: npm test

      - name: Run coverlint
        env:
          INPUT_PATH: coverage/lcov.info
          INPUT_FORMAT: lcov
          INPUT_MIN-LINE: "100"
          INPUT_MIN-FUNCTION: "100"
          INPUT_WORKING-DIRECTORY: testdata/projects/node
          INPUT_FAIL-ON-ERROR: "true"
        run: ./coverlint

  test-cobertura-python:
    needs: build-coverlint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverlint-binary
      - run: chmod +x coverlint

      - name: Install dependencies
        run: pip install pytest==9.0.2 pytest-cov==7.0.0

      - name: Generate coverage
        working-directory: testdata/projects/python
        run: pytest --cov=. --cov-branch --cov-report=xml:coverage.xml

      - name: Run coverlint
        env:
          INPUT_PATH: coverage.xml
          INPUT_FORMAT: cobertura
          INPUT_MIN-LINE: "100"
          INPUT_MIN-BRANCH: "100"
          INPUT_WORKING-DIRECTORY: testdata/projects/python
          INPUT_FAIL-ON-ERROR: "true"
        run: ./coverlint

  test-clover-php:
    needs: build-coverlint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.4"
          coverage: xdebug
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverlint-binary
      - run: chmod +x coverlint

      - name: Install dependencies
        working-directory: testdata/projects/php
        run: composer install --no-interaction

      - name: Generate coverage
        working-directory: testdata/projects/php
        env:
          XDEBUG_MODE: coverage
        run: vendor/bin/phpunit --path-coverage --coverage-clover=coverage.xml

      - name: Run coverlint
        env:
          INPUT_PATH: coverage.xml
          INPUT_FORMAT: clover
          INPUT_MIN-LINE: "100"
          INPUT_MIN-BRANCH: "100"
          INPUT_MIN-FUNCTION: "100"
          INPUT_WORKING-DIRECTORY: testdata/projects/php
          INPUT_FAIL-ON-ERROR: "true"
        run: ./coverlint

  test-jacoco-java:
    needs: build-coverlint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverlint-binary
      - run: chmod +x coverlint

      - name: Generate coverage
        working-directory: testdata/projects/java
        run: gradle test jacocoTestReport

      - name: Run coverlint
        env:
          INPUT_PATH: build/reports/jacoco/test/jacocoTestReport.xml
          INPUT_FORMAT: jacoco
          INPUT_MIN-LINE: "100"
          INPUT_MIN-BRANCH: "100"
          INPUT_MIN-FUNCTION: "100"
          INPUT_WORKING-DIRECTORY: testdata/projects/java
          INPUT_FAIL-ON-ERROR: "true"
        run: ./coverlint

  test-monorepo:
    needs: build-coverlint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverlint-binary
      - run: chmod +x coverlint

      - name: Generate Go coverage
        working-directory: testdata/projects/monorepo/go-service
        run: go test -coverprofile=cover.out ./...

      - name: Install Node dependencies
        working-directory: testdata/projects/monorepo/node-service
        run: npm install

      - name: Generate Node coverage
        working-directory: testdata/projects/monorepo/node-service
        run: npm test

      - name: Install Python dependencies
        run: pip install pytest==9.0.2 pytest-cov==7.0.0

      - name: Generate Python coverage
        working-directory: testdata/projects/monorepo/python-service
        run: pytest --cov=. --cov-branch --cov-report=xml:coverage.xml

      - name: Run coverlint (multi-format with explicit paths)
        env:
          INPUT_FORMAT: gocover,lcov,cobertura
          INPUT_PATH: "go-service/cover.out, node-service/coverage/lcov.info, python-service/coverage.xml"
          INPUT_MIN-LINE: "80"
          INPUT_WORKING-DIRECTORY: testdata/projects/monorepo
          INPUT_FAIL-ON-ERROR: "true"
        run: ./coverlint

  test-lcov-rust:
    needs: build-coverlint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: llvm-tools-preview
      - run: cargo install cargo-llvm-cov --version 0.8.4
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverlint-binary
      - run: chmod +x coverlint

      - name: Generate coverage
        working-directory: testdata/projects/rust
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Run coverlint
        env:
          INPUT_PATH: lcov.info
          INPUT_FORMAT: lcov
          INPUT_MIN-LINE: "100"
          INPUT_MIN-FUNCTION: "100"
          INPUT_WORKING-DIRECTORY: testdata/projects/rust
          INPUT_FAIL-ON-ERROR: "true"
        run: ./coverlint
