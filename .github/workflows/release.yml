# Release workflow with SLSA Build Level 3 provenance and cosign signing.
#
# Architecture:
#   1. build: SLSA Go builder (reusable workflow) compiles each platform
#      binary in an isolated environment and generates signed in-toto
#      provenance attestations (.intoto.jsonl). This provides SLSA L3
#      because the build runs outside the caller's control. Creates a
#      draft release so parallel matrix jobs can upload without hitting
#      release immutability.
#   2. package: Creates tar.gz/zip archives, checksums, and SBOMs from
#      the SLSA-built binaries. Signs checksums.txt with cosign keyless
#      signing (Sigstore Fulcio). Uploads everything to the draft release.
#   3. release.sh: Appends SHA pinning guidance to the release body,
#      then publishes the draft (making it immutable).
#
# Verification:
#   SLSA provenance: slsa-verifier verify-artifact --source-uri github.com/evansims/coverlint <binary>
#   Cosign signature: cosign verify-blob --bundle checksums.txt.bundle checksums.txt
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    permissions:
      id-token: write
      contents: write
      actions: read
    # NOTE: The SLSA Go builder requires a tag ref (refs/tags/vX.Y.Z), not a
    # commit SHA. This is an intentional security constraint of the builder —
    # it verifies its own release integrity via tag. SHA-pinning is not supported.
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_go_slsa3.yml@v2.1.0
    with:
      go-version-file: go.mod
      config-file: .slsa-goreleaser/${{ matrix.os }}-${{ matrix.arch }}.yml
      upload-assets: true
      upload-tag-name: ${{ github.ref_name }}
      draft-release: "true"

  package:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download SLSA-built binaries from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          gh release download "$TAG" --pattern 'coverlint_*' --skip-existing --dir dist/
          # Remove provenance files from the working set (they stay on the release)
          rm -f dist/*.intoto.jsonl
          ls -la dist/

      - name: Create archives
        run: |
          cd dist
          for bin in coverlint_linux_* coverlint_darwin_*; do
            [ -f "$bin" ] || continue
            chmod +x "$bin"
            tar czf "${bin}.tar.gz" "$bin"
          done
          for bin in coverlint_windows_*.exe; do
            [ -f "$bin" ] || continue
            name="${bin%.exe}"
            zip "${name}.zip" "$bin"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - uses: anchore/sbom-action/download-syft@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0

      - name: Generate SBOMs
        run: |
          cd dist
          for archive in *.tar.gz *.zip; do
            [ -f "$archive" ] || continue
            syft "$archive" -o spdx-json="${archive}.sbom.json"
          done

      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4

      - name: Sign checksums with cosign
        run: |
          cosign sign-blob --yes \
            --bundle dist/checksums.txt.bundle \
            dist/checksums.txt

      - name: Upload packaging artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" --clobber \
            dist/*.tar.gz \
            dist/*.zip \
            dist/checksums.txt \
            dist/checksums.txt.bundle \
            dist/*.sbom.json

      # The release stays as a draft so release.sh can edit the body
      # (append SHA pinning guidance) before publishing. Once published,
      # release immutability prevents further modifications.
