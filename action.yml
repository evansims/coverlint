name: 'Coverlint'
description: 'Parse coverage reports and enforce thresholds via GitHub Actions annotations'
author: 'evansims'

inputs:
  path:
    description: 'Path to coverage report file(s). Supports globs (*.out) and comma-separated values. Auto-discovered if omitted.'
    required: false
    default: ''
  format:
    description: 'Coverage format(s): lcov, gocover, cobertura, clover, jacoco. Comma-separated for monorepos (e.g., "gocover,lcov").'
    required: true
  threshold-line:
    description: 'Minimum line coverage percentage (0-100)'
    required: false
  threshold-branch:
    description: 'Minimum branch coverage percentage (0-100)'
    required: false
  threshold-function:
    description: 'Minimum function coverage percentage (0-100)'
    required: false
  working-directory:
    description: 'Working directory for resolving relative paths'
    required: false
    default: '.'
  fail-on-error:
    description: 'Whether to fail the action when thresholds are not met'
    required: false
    default: 'true'
  suggestions:
    description: 'Show top opportunities for coverage improvement in job summary'
    required: false
    default: 'true'

outputs:
  results:
    description: 'JSON string of coverage results'
    value: ${{ steps.run.outputs.results }}
  passed:
    description: 'Whether all thresholds were met (true or false)'
    value: ${{ steps.run.outputs.passed }}

runs:
  using: "composite"
  steps:
    - name: Download coverlint binary
      shell: bash
      run: |
        os="${{ runner.os }}"
        arch="${{ runner.arch }}"

        case "$os" in
          macOS)  os="darwin" ;;
          Linux)  os="linux" ;;
          Windows) os="windows" ;;
        esac

        case "$arch" in
          X64)   arch="amd64" ;;
          ARM64) arch="arm64" ;;
        esac

        version="${{ github.action_ref }}"
        repo="evansims/coverlint"
        binary="coverlint"
        ext="tar.gz"
        if [[ "$os" == "windows" ]]; then ext="zip"; fi

        archive="${binary}_${os}_${arch}.${ext}"
        base_url="https://github.com/${repo}/releases/download/${version}"

        echo "Downloading ${base_url}/${archive}"
        tmpdir=$(mktemp -d)
        cd "$tmpdir"

        curl -fsL "${base_url}/${archive}" -o "${archive}"
        curl -fsL "${base_url}/checksums.txt" -o checksums.txt

        # Verify checksum before extracting
        if command -v sha256sum &>/dev/null; then
          sha256sum --check --ignore-missing checksums.txt
        elif command -v shasum &>/dev/null; then
          grep "${archive}" checksums.txt | shasum -a 256 --check
        else
          echo "::warning::No sha256sum or shasum available — skipping checksum verification"
        fi

        if [[ "$ext" == "zip" ]]; then
          unzip -q "${archive}"
        else
          tar xzf "${archive}"
        fi

        chmod +x "${binary}"*
        echo "${tmpdir}" >> "$GITHUB_PATH"

    - name: Run coverage check
      id: run
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_THRESHOLD-LINE: ${{ inputs.threshold-line }}
        INPUT_THRESHOLD-BRANCH: ${{ inputs.threshold-branch }}
        INPUT_THRESHOLD-FUNCTION: ${{ inputs.threshold-function }}
        INPUT_WORKING-DIRECTORY: ${{ inputs.working-directory }}
        INPUT_FAIL-ON-ERROR: ${{ inputs.fail-on-error }}
        INPUT_SUGGESTIONS: ${{ inputs.suggestions }}
      run: coverlint
