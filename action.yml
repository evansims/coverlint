name: 'Coverlint'
description: 'Parse coverage reports and enforce thresholds via GitHub Actions annotations. Minimum permissions: contents: read.'
author: 'evansims'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  path:
    description: 'Path to coverage report file(s). One per line or comma-separated. Supports globs. Auto-discovered if omitted.'
    required: false
    default: ''
  format:
    description: 'Coverage format(s): lcov, gocover, cobertura, clover, jacoco. One per line or comma-separated. Auto-detected if omitted.'
    required: false
    default: ''
  min-coverage:
    description: 'Minimum weighted coverage score (0-100). Computed from line/branch/function using configurable weights.'
    required: false
  min-line:
    description: 'Minimum line coverage percentage (0-100). Hard floor checked independently of weighted score.'
    required: false
  min-branch:
    description: 'Minimum branch coverage percentage (0-100). Hard floor checked independently of weighted score.'
    required: false
  min-function:
    description: 'Minimum function coverage percentage (0-100). Hard floor checked independently of weighted score.'
    required: false
  working-directory:
    description: 'Working directory for resolving relative paths'
    required: false
    default: '.'
  fail-on-error:
    description: 'Whether to fail the action when thresholds are not met'
    required: false
    default: 'true'
  weight-line:
    description: 'Weight for line coverage in the score calculation (default: 50). Relative to other weights.'
    required: false
  weight-branch:
    description: 'Weight for branch coverage in the score calculation (default: 30). Relative to other weights.'
    required: false
  weight-function:
    description: 'Weight for function coverage in the score calculation (default: 20). Relative to other weights.'
    required: false
  suggestions:
    description: 'Show top opportunities for coverage improvement in job summary'
    required: false
    default: 'true'
  annotations:
    description: 'Annotation output: true (default), false, or a max count'
    required: false
    default: 'true'
  sarif:
    description: 'Generate SARIF output for GitHub Code Scanning: true (default max 500 results), false, or a number (default: false)'
    required: false
    default: 'false'
  baseline:
    description: 'JSON string of previous baseline data for delta comparison'
    required: false
    default: ''
  min-delta:
    description: 'Minimum allowed score change (can be negative to allow drops, e.g. -2.0)'
    required: false
    default: ''

outputs:
  results:
    description: 'JSON string of coverage results'
    value: ${{ steps.run.outputs.results }}
  passed:
    description: 'Whether all thresholds were met (true or false)'
    value: ${{ steps.run.outputs.passed }}
  badge-svg:
    description: 'SVG badge showing weighted coverage score'
    value: ${{ steps.run.outputs.badge-svg }}
  badge-json:
    description: 'Shields.io endpoint JSON for weighted coverage score badge'
    value: ${{ steps.run.outputs.badge-json }}
  baseline:
    description: 'JSON baseline data for the current run, suitable for storage and future comparison'
    value: ${{ steps.run.outputs.baseline }}
  sarif:
    description: 'SARIF JSON for uploading to GitHub Code Scanning'
    value: ${{ steps.run.outputs.sarif }}

runs:
  using: "composite"
  steps:
    - name: Download coverlint binary
      shell: bash
      env:
        RUNNER_OS_INPUT: ${{ runner.os }}
        RUNNER_ARCH_INPUT: ${{ runner.arch }}
        ACTION_REF: ${{ github.action_ref }}
        # COVERLINT_VERSION is stamped by release.sh at release time.
        # It serves as the fallback when github.action_ref is a commit SHA
        # (i.e., the action is pinned by SHA rather than by tag).
        COVERLINT_VERSION: "v0.0.0-dev"
      run: |
        os="$RUNNER_OS_INPUT"
        arch="$RUNNER_ARCH_INPUT"

        case "$os" in
          macOS)  os="darwin" ;;
          Linux)  os="linux" ;;
          Windows) os="windows" ;;
        esac

        case "$arch" in
          X64)   arch="amd64" ;;
          ARM64) arch="arm64" ;;
        esac

        version="$ACTION_REF"

        # If action_ref is a version tag (e.g., v1, v1.2.0), use it directly.
        # If it's a commit SHA (SHA-pinned usage), fall back to COVERLINT_VERSION.
        if [[ ! "$version" =~ ^v[0-9]+ ]]; then
          version="$COVERLINT_VERSION"
        fi

        if [[ ! "$version" =~ ^v[0-9]+ ]]; then
          echo "::error::Could not determine coverlint version. Use a version tag (e.g., @v1) or ensure COVERLINT_VERSION is set."
          exit 1
        fi

        repo="evansims/coverlint"
        binary="coverlint_${os}_${arch}"
        ext="tar.gz"
        if [[ "$os" == "windows" ]]; then ext="zip"; fi

        archive="${binary}.${ext}"
        base_url="https://github.com/${repo}/releases/download/${version}"

        echo "Downloading ${base_url}/${archive}"
        tmpdir=$(mktemp -d)
        cd "$tmpdir"

        curl -fsL "${base_url}/${archive}" -o "${archive}"
        curl -fsL "${base_url}/checksums.txt" -o checksums.txt

        # Verify checksum before extracting.
        # Note: checksums.txt is cosign-signed (.sig/.pem available on the release).
        # This check protects against transport corruption. For cryptographic
        # verification, use: cosign verify-blob --bundle checksums.txt.bundle checksums.txt
        # For SLSA L3 provenance verification of the underlying binary, use:
        #   slsa-verifier verify-artifact --source-uri github.com/evansims/coverlint <binary>
        if command -v sha256sum &>/dev/null; then
          sha256sum --check --ignore-missing checksums.txt
        elif command -v shasum &>/dev/null; then
          grep "${archive}" checksums.txt | shasum -a 256 --check
        else
          echo "::error::No sha256sum or shasum available — cannot verify checksum"
          exit 1
        fi

        if [[ "$ext" == "zip" ]]; then
          unzip -q "${archive}"
        else
          tar xzf "${archive}"
        fi

        chmod +x "${binary}"
        # Symlink to 'coverlint' so the run step can invoke it by name
        ln -sf "${binary}" coverlint
        echo "${tmpdir}" >> "$GITHUB_PATH"

    - name: Run coverage check
      id: run
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_MIN-COVERAGE: ${{ inputs.min-coverage }}
        INPUT_MIN-LINE: ${{ inputs.min-line }}
        INPUT_MIN-BRANCH: ${{ inputs.min-branch }}
        INPUT_MIN-FUNCTION: ${{ inputs.min-function }}
        INPUT_WORKING-DIRECTORY: ${{ inputs.working-directory }}
        INPUT_FAIL-ON-ERROR: ${{ inputs.fail-on-error }}
        INPUT_WEIGHT-LINE: ${{ inputs.weight-line }}
        INPUT_WEIGHT-BRANCH: ${{ inputs.weight-branch }}
        INPUT_WEIGHT-FUNCTION: ${{ inputs.weight-function }}
        INPUT_SUGGESTIONS: ${{ inputs.suggestions }}
        INPUT_ANNOTATIONS: ${{ inputs.annotations }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_MIN-DELTA: ${{ inputs.min-delta }}
        INPUT_SARIF: ${{ inputs.sarif }}
      run: coverlint
